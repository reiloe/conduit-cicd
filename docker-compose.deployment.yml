version: "3.9"

services:
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:${TAG}
    restart: on-failure
    env_file: .env
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    pull_policy: always

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${TAG}
    restart: on-failure
    env_file: .env
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - backend-db:/app/db
    depends_on:
      - backend-init
    pull_policy: always

  backend-init:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${TAG}
    restart: "no"
    env_file: .env
    command: >
      sh -c "python manage.py migrate --noinput && \
             DJANGO_SUPERUSER_PASSWORD=\"${DJANGO_SU_PASSWORD}\" \
             python manage.py createsuperuser --noinput \
             --username \"${DJANGO_SU_NAME}\" --email \"${DJANGO_SU_EMAIL}\" \
             || echo 'superuser exists or create returned non-zero (ignored)'"
    volumes:
      - backend-db:/app/db
    pull_policy: always

volumes:
  backend-db: