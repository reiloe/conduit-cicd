---
services:

  frontend:
    build:
      context: ./conduit-frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT}:80"    
    env_file: ".env"
    restart: on-failure
    depends_on:
      - backend

  backend:
    build:
      context: ./conduit-backend
      dockerfile: Dockerfile    
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file: ".env"
    restart: on-failure    
    volumes:
      - backend-db:/app/db
    depends_on:
      - backend-init

  backend-init:
    build:
      context: ./conduit-backend
      dockerfile: Dockerfile
    env_file: ".env"
    restart: "no"
    command: >
      sh -c "python manage.py migrate --noinput && DJANGO_SUPERUSER_PASSWORD=\"${DJANGO_SU_PASSWORD}\" python manage.py createsuperuser --username \"${DJANGO_SU_NAME}\" --email \"${DJANGO_SU_EMAIL}\" --noinput"
    volumes:
      - backend-db:/app/db
volumes:
  backend-db: